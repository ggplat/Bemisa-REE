name: Atualizar Dashboard MCap REE

# Roda todo dia útil após o fechamento de ASX (06:00 UTC) e TSX (21:00 UTC)
# e pode ser disparado manualmente em Actions → "Atualizar Dashboard MCap REE" → Run workflow.
on:
  schedule:
    - cron: "0 22 * * 1-5"   # 22:00 UTC, seg-sex
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-mcap-dashboard
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Gerar dashboard
        run: python mcap_dashboard.py

      - name: Commit e push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/mcap_dashboard.html
          git diff --staged --quiet || git commit -m "dashboard: atualiza mcap $(date -u +%Y-%m-%d)"
          git push
