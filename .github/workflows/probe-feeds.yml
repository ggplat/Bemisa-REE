name: Probe feeds (temporario)

# Diagnostico manual: inspeciona os feeds reais de EFR/Aclara na rede da CI.
# NAO commita nada. Removido apos o ajuste dos parsers.
on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - run: python tools/probe_feeds.py
